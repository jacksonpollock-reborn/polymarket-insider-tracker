name: Polymarket Insider Tracker

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      min_score:
        description: "Minimum suspicion score (default: 40)"
        required: false
        default: "40"

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run insider tracker
        env:
          POLYGONSCAN_API_KEY:  ${{ secrets.POLYGONSCAN_API_KEY }}
          DUNE_API_KEY:         ${{ secrets.DUNE_API_KEY }}
          ARKHAM_API_KEY:       ${{ secrets.ARKHAM_API_KEY }}
          GMAIL_USER:           ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:             ${{ secrets.EMAIL_TO }}
          MIN_SUSPICION_SCORE:  ${{ github.event.inputs.min_score || '40' }}
          MAX_WALLETS_TO_SCORE: "60"
        run: python main.py

      - name: Upload watchlist artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: watchlist-${{ github.run_id }}
          path: watchlist.json
          retention-days: 30
