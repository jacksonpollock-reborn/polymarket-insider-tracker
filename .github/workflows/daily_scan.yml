name: Polymarket Strategy Tracker

on:
  schedule:
  - cron: "0 1 * * *"   # 台北時間 09:00
  - cron: "0 14 * * *"  # 台北時間 22:00
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore paper portfolio
        uses: actions/cache@v4
        with:
          path: paper_portfolio.json
          key: paper-portfolio

      - name: Restore review log
        uses: actions/cache@v4
        with:
          path: review_log.json
          key: review-log

      - name: Run strategy tracker
        env:
          POLYGONSCAN_API_KEY:  ${{ secrets.POLYGONSCAN_API_KEY }}
          DUNE_API_KEY:         ${{ secrets.DUNE_API_KEY }}
          ARKHAM_API_KEY:       ${{ secrets.ARKHAM_API_KEY }}
          GMAIL_USER:           ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:             ${{ secrets.EMAIL_TO }}
          MAX_WALLETS_TO_SCORE: "60"
        run: python main.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tracker-run-${{ github.run_id }}
          path: |
            watchlist.json
            review_log.json
            paper_portfolio.json
            tuning_summary.json
            tuning_checklist.md
            report.html
          retention-days: 30
